<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Content-Security-Policy"
content="default-src 'self' https: ws: wss:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">

<title>RPG ONLINE FINAL</title>

<style>
body{margin:0;background:#000;color:#fff;text-align:center;font-family:sans-serif}
canvas{background:#111;border:2px solid cyan;margin-top:100px;border-radius:10px}
button{margin:3px;padding:8px;background:cyan;border:none;border-radius:8px}

#top{position:absolute;top:0;width:100%;background:#000a}
#bottom{position:absolute;bottom:0;width:100%;background:#000a}
#dev{display:none}
</style>
</head>

<body>

<div id="menu">
<h2>RPG ONLINE</h2>
<button onclick="start(false)">Player</button>
<button onclick="start(true)">Dev</button>
</div>

<div id="game" style="display:none">

<div id="top">
<button onclick="attack()">⚔️</button>
<p id="info"></p>
</div>

<canvas id="c" width="320" height="220"></canvas>

<div id="bottom">
<button id="l">⬅️</button>
<button id="r">➡️</button>
<button id="u">⬆️</button>
<button id="d">⬇️</button>

<div id="dev">
<button onclick="revive()">Revive</button>
<button onclick="heal()">Heal</button>
<button onclick="addMoney()">+Money</button>
<button onclick="infHP()">Inf HP</button>
</div>

</div>

</div>

<script>
const ctx=c.getContext("2d")

// ===== SOUND =====
let hit=new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg")
let kill=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")

// ===== SPRITE =====
let pImg=new Image(); pImg.src="player.png"
let eImg=new Image(); eImg.src="enemy.png"
let bImg=new Image(); bImg.src="boss.png"

// ===== DATA =====
let player={x:50,y:150,hp:100,maxHp:100,atk:5,gold:0}
let enemy={x:250,y:150,hp:100,maxHp:100}
let boss={x:200,y:80,hp:500,phase:1,cd:0}

let move={x:0,y:0},lastHit=0,devMode=false,inf=false

// ===== MULTIPLAYER =====
let socket
let others={}

function connect(){
socket=new WebSocket("wss://YOUR_SERVER_URL")

socket.onmessage=e=>{
others=JSON.parse(e.data)
}
}

function send(){
if(socket && socket.readyState===1){
socket.send(JSON.stringify({x:player.x,y:player.y}))
}
}

// ===== START =====
function start(dev){
if(dev){
let p=prompt("Dev Password:")
if(p!=="M45KED7") return
devMode=true
document.getElementById("dev").style.display="block"
}

menu.style.display="none"
game.style.display="block"

connect()

hold(l,-2,0);hold(r,2,0);hold(u,0,-2);hold(d,0,2)

loop()
}

// ===== CONTROL =====
function hold(b,x,y){
b.onmousedown=b.ontouchstart=()=>move={x,y}
b.onmouseup=b.ontouchend=()=>move={x:0,y:0}
}

// ===== ATTACK =====
function attack(){
let d=Math.hypot(player.x-enemy.x,player.y-enemy.y)
if(d<40){
enemy.hp-=player.atk
hit.play()
}
}

// ===== BOSS AI =====
function bossAI(){
boss.x+=(player.x-boss.x)*0.01
boss.y+=(player.y-boss.y)*0.01

if(boss.hp<350) boss.phase=2
if(boss.hp<150) boss.phase=3

if(Date.now()>boss.cd){
if(!inf){
player.hp-=boss.phase*3
}
boss.cd=Date.now()+2000
}

ctx.drawImage(bImg,boss.x,boss.y,30,30)
}

// ===== DRAW =====
function draw(){
ctx.clearRect(0,0,320,220)

// player move
player.x+=move.x
player.y+=move.y

// draw player
ctx.drawImage(pImg,player.x,player.y,20,20)

// enemy follow
enemy.x+=(player.x-enemy.x)*0.02
enemy.y+=(player.y-enemy.y)*0.02

ctx.drawImage(eImg,enemy.x,enemy.y,20,20)

// damage
let d=Math.hypot(player.x-enemy.x,player.y-enemy.y)

if(d<30 && Date.now()-lastHit>2000){
if(!inf) player.hp-=5
lastHit=Date.now()
}

// kill
if(enemy.hp<=0){
player.gold+=20
enemy.hp=enemy.maxHp
kill.play()
}

// boss
bossAI()

// multiplayer draw
send()
for(let id in others){
let p=others[id]
ctx.fillStyle="yellow"
ctx.fillRect(p.x,p.y,20,20)
}

// UI
info.innerText="HP:"+player.hp+" GOLD:"+player.gold+" BOSS PH:"+boss.phase
}

// ===== DEV =====
function revive(){if(devMode) player.hp=player.maxHp}
function heal(){if(devMode) player.hp=player.maxHp}
function addMoney(){if(devMode) player.gold+=999999}
function infHP(){if(devMode) inf=!inf}

// ===== LOOP =====
function loop(){
draw()
requestAnimationFrame(loop)
}
</script>

</body>
</html>
